<body>
    <div class="container">
        <div class="header">
            <h1>🤖 X Reply Generator</h1>
            <p>🇯🇵 Gemini AI buat reply Jepang natural untuk tweet</p>
        </div>

        <!-- API Key Input -->
        <div class="api-section">
            <div class="input-group">
                <label>🔑 Gemini API Key:</label>
                <input type="password" id="apiKey" placeholder="Masukkan API Key dari aistudio.google.com">
                <small><a href="https://aistudio.google.com/app/apikey" target="_blank">Dapatkan gratis</a></small>
            </div>
        </div>

        <!-- Main Form -->
        <div class="form-container">
            <div class="input-group">
                <label for="tweetUrl">🔗 Link Tweet X/Twitter:</label>
                <input type="url" id="tweetUrl" placeholder="https://twitter.com/elonmusk/status/123456789">
            </div>
            <button class="generate-btn" onclick="generateReply()">
                🚀 Generate Reply Jepang
            </button>
        </div>

        <!-- Loading -->
        <div class="loading" id="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Gemini AI sedang generate... ⏳</p>
        </div>

        <!-- Result -->
        <div class="result" id="result" style="display: none;">
            <h3>💬 Reply Jepang Natural:</h3>
            <div class="reply-box" id="replyBox"></div>
            <button class="copy-btn" onclick="copyReply()">📋 Copy ke Clipboard</button>
        </div>

        <!-- Error -->
        <div class="error" id="error" style="display: none;"></div>

        <!-- Info -->
        <div class="info">
